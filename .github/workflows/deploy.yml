name: Deploy Brand-er

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_ID: jwmzjszdjlrqrhadbggr
  APP_BASE_URL: https://brand-er1.github.io/clothology-express

jobs:
  backend:
    name: Deploy Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply database migrations
        run: supabase db push --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy KakaoPay functions
        run: |
          supabase functions deploy kakaopay-ready --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy kakaopay-approve --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy kakaopay-cancel --project-ref "$SUPABASE_PROJECT_ID"

      - name: Allow GitHub Pages auth callback
        shell: bash
        run: |
          config="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/config/auth")"
          current="$(jq -r '.uri_allow_list // ""' <<<"$config")"
          callback="$APP_BASE_URL/auth/callback"
          if tr ',' '\n' <<<"$current" | sed 's/^ *//;s/ *$//' | grep -Fxq "$callback"; then
            exit 0
          fi
          updated="${current:+$current,}$callback"
          payload="$(jq -n --arg uri_allow_list "$updated" '{uri_allow_list: $uri_allow_list}')"
          curl --fail --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/config/auth" \
            >/dev/null

  frontend:
    name: Deploy GitHub Pages
    needs: backend
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build
        run: npm run build

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
